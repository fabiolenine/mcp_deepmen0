<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>DeepMem0 Vault</title>

       internet nem contar a um terceiro quando o admin a abre. A pilha de

       fontes de sistema. -->
  <link rel="stylesheet" href="/static/vault.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/vault-copy.js" defer></script>
</head>

{% block body %}{% endblock %}
</body>
</html>
